version: '3'

services:
  nakama:
    image: registry.heroiclabs.com/heroiclabs/nakama:3.22.0
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address "$DATABASE_PUBLIC_URL" &&
        exec /nakama/nakama
        --config /nakama/data/local.yml
        --database.address "$DATABASE_PUBLIC_URL"
    volumes:
      - ./build:/nakama/data/modules/build
      - ./local.yml:/nakama/data/local.yml
    ports:
      - "7350:7350"
      - "7351:7351"
      - "7349:7349"
    restart: unless-stopped